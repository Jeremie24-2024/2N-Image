<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Galerie Mariage | 2N IMAGE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #1e1e1e;
            scroll-behavior: smooth;
            line-height: 1.6;
        }

        /* Gallery Container */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem 2rem;
            background: #ffffff;
        }

        /* Header with Back Arrow and Title */
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 3rem;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .back-arrow {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            color: #C4A27A;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            background: transparent;
        }

        .back-arrow i {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        <!-- .back-arrow:hover {
            color: #A5825A;
            background: white;
        } -->

        .back-arrow:hover i {
            transform: translateX(-5px);
        }

        .gallery-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #2c2c2c;
            position: relative;
            display: inline-block;
        }

        /* Masonry Grid - 3 columns with varying heights (puzzle style) */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            grid-auto-rows: masonry;
            /* Fallback for browsers that don't support masonry */
        }

        /* Standard grid fallback with dynamic row heights */
        @supports not (grid-template-rows: masonry) {
            .masonry-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }
            
            .grid-item {
                break-inside: avoid;
                margin-bottom: 0;
            }
            
            /* Alternative: use column layout for fallback */
            @media (min-width: 768px) {
                .masonry-grid {
                    display: block;
                    column-count: 3;
                    column-gap: 1.5rem;
                }
                
                .grid-item {
                    display: inline-block;
                    width: 100%;
                    margin-bottom: 1.5rem;
                    break-inside: avoid;
                }
            }
        }

        /* Grid Item Styling */
        .grid-item {
            position: relative;
            overflow: hidden;
            border-radius: 0px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: #fafafa;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .grid-item:hover img {
            transform: scale(1.02);
        }

        /* Lightbox overlay for image preview */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 1001;
        }

        .close-lightbox:hover {
            transform: scale(1.1);
            color: #C4A27A;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .masonry-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
            
            @supports not (grid-template-rows: masonry) {
                @media (min-width: 768px) {
                    .masonry-grid {
                        column-count: 3;
                        column-gap: 1rem;
                    }
                    
                    .grid-item {
                        margin-bottom: 1rem;
                    }
                }
            }
        }

        @media (max-width: 768px) {
            .gallery-container {
                padding: 1.5rem 1rem 3rem 1rem;
            }
            
            .gallery-header {
                margin-bottom: 2rem;
                flex-direction: column;
                gap: 1rem;
            }
            
            .back-arrow {
                position: static;
                transform: none;
                margin-bottom: 0.5rem;
                align-self: flex-start;
            }
            
            .gallery-title {
                font-size: 1.8rem;
            }
            
            .masonry-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            
            @supports not (grid-template-rows: masonry) {
                @media (min-width: 480px) {
                    .masonry-grid {
                        column-count: 2;
                        column-gap: 1rem;
                    }
                    
                    .grid-item {
                        margin-bottom: 1rem;
                    }
                }
            }
        }

        @media (max-width: 480px) {
            .masonry-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            @supports not (grid-template-rows: masonry) {
                .masonry-grid {
                    column-count: 1;
                    column-gap: 0;
                }
                
                .grid-item {
                    margin-bottom: 1rem;
                }
            }
            
            .gallery-title {
                font-size: 1.5rem;
            }
        }

        /* Optional subtle loading animation */
        .grid-item {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stagger animation for grid items */
        .grid-item:nth-child(1) { animation-delay: 0.05s; }
        .grid-item:nth-child(2) { animation-delay: 0.1s; }
        .grid-item:nth-child(3) { animation-delay: 0.15s; }
        .grid-item:nth-child(4) { animation-delay: 0.2s; }
        .grid-item:nth-child(5) { animation-delay: 0.25s; }
        .grid-item:nth-child(6) { animation-delay: 0.3s; }
        .grid-item:nth-child(7) { animation-delay: 0.35s; }
        .grid-item:nth-child(8) { animation-delay: 0.4s; }
        .grid-item:nth-child(9) { animation-delay: 0.45s; }
        .grid-item:nth-child(10) { animation-delay: 0.5s; }
    </style>
</head>
<body>

<div class="gallery-container">
    <div class="gallery-header">
        <a href="index.html#portfolio" class="back-arrow">
            <i class="fas fa-arrow-left"></i>
            <span>Retour au portfolio</span>
        </a>
        <h1 class="gallery-title">Galerie Mariage</h1>
    </div>

    <div class="masonry-grid" id="masonryGrid">
        <!-- 10 images with varying heights (puzzle style) -->
        <!-- Images use different aspect ratios to create the puzzle effect -->
    </div>
</div>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox">
    <span class="close-lightbox">&times;</span>
    <img id="lightboxImg" src="" alt="Image agrandie">
</div>

<script>
    // Array of 10 wedding images
    const weddingImages = [
        { src: "image/mariage.png", alt: "Mariage Coutumier - Cérémonie traditionnelle" },
        { src: "image/mariage2.png", alt: "Mariage - Échange des alliances" },
        { src: "image/mariage3.png", alt: "Mariage - Couple de mariés" },
        { src: "image/mariage4.png", alt: "Mariage - Célébration" },
        { src: "image/mariage5.png", alt: "Mariage - Moments de joie" },
        { src: "image/mariage6.png", alt: "Mariage - Détails romantiques" },
        { src: "image/mariage7.png", alt: "Mariage - Danse des mariés" },
        { src: "image/mariage8.png", alt: "Mariage - Portraits de famille" },
        { src: "image/mariage9.png", alt: "Mariage - Cérémonie religieuse" },
        { src: "image/mariage10.png", alt: "Mariage - Fin de soirée" }
    ];

    // Different height styles for puzzle effect (simulating varying image heights)
    // We'll add inline style to each image with different aspect ratios to create masonry/puzzle look
    const heightStyles = [
        { paddingBottom: "125%" },  // tall portrait
        { paddingBottom: "75%" },   // landscape
        { paddingBottom: "100%" },  // square
        { paddingBottom: "140%" },  // very tall
        { paddingBottom: "66%" },   // wide landscape
        { paddingBottom: "110%" },  // medium tall
        { paddingBottom: "85%" },   // medium
        { paddingBottom: "130%" },  // tall
        { paddingBottom: "70%" },   // landscape
        { paddingBottom: "115%" }   // tall portrait
    ];

    const masonryGrid = document.getElementById('masonryGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeLightbox = document.querySelector('.close-lightbox');

    // Generate gallery items
    function generateGallery() {
        if (!masonryGrid) return;

        // Clear existing content
        masonryGrid.innerHTML = '';

        // Create 10 gallery items
        for (let i = 0; i < weddingImages.length; i++) {
            const imgData = weddingImages[i];
            const heightStyle = heightStyles[i % heightStyles.length];
            
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            
            // Create img element
            const img = document.createElement('img');
            img.src = imgData.src;
            img.alt = imgData.alt;
            img.loading = "lazy";
            
            // Add error handling for missing images
            img.onerror = function() {
                this.src = 'https://via.placeholder.com/800x1000?text=Image+non+disponible';
                this.alt = 'Image temporairement indisponible';
            };
            
            // Create wrapper div to maintain aspect ratio for puzzle effect
            const imgWrapper = document.createElement('div');
            imgWrapper.style.position = 'relative';
            imgWrapper.style.width = '100%';
            imgWrapper.style.overflow = 'hidden';
            imgWrapper.style.backgroundColor = '#f5f5f5';
            imgWrapper.style.borderRadius = '0px';
            
            // Apply different aspect ratios to create varying heights (puzzle style)
            imgWrapper.style.paddingBottom = heightStyle.paddingBottom;
            
            // Style the image to fill the wrapper
            img.style.position = 'absolute';
            img.style.top = '0';
            img.style.left = '0';
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            
            imgWrapper.appendChild(img);
            gridItem.appendChild(imgWrapper);
            
            // Add click event for lightbox
            gridItem.addEventListener('click', (function(currentSrc, currentAlt) {
                return function() {
                    openLightbox(currentSrc, currentAlt);
                };
            })(imgData.src, imgData.alt));
            
            masonryGrid.appendChild(gridItem);
        }
    }

    // Lightbox functions
    function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightboxFunction() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lightboxImg.src = '';
    }

    // Close lightbox on click outside image
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            closeLightboxFunction();
        }
    });

    closeLightbox.addEventListener('click', closeLightboxFunction);

    // Close lightbox on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
            closeLightboxFunction();
        }
    });

    // Generate gallery on load
    generateGallery();

    // Add additional images if needed - ensures exactly 10 images
    // If some images are missing, we have fallback placeholders
    // Also add intersection observer for lazy loading optimization
    if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                    }
                    observer.unobserve(img);
                }
            });
        });
        
        document.querySelectorAll('.grid-item img').forEach(img => {
            if (img.src === '') {
                imageObserver.observe(img);
            }
        });
    }

    // Fallback for browsers that don't support masonry grid properly
    // Ensure the grid displays correctly with varying heights
    function adjustGridFallback() {
        const isMasonrySupported = CSS.supports('grid-template-rows', 'masonry');
        if (!isMasonrySupported) {
            // For browsers without native masonry, we rely on column-count which works well
            const grid = document.querySelector('.masonry-grid');
            if (grid && window.innerWidth >= 768) {
                // Ensure column layout works
                grid.style.display = 'block';
            }
        }
    }
    
    // Run after images load to ensure proper layout
    window.addEventListener('load', function() {
        adjustGridFallback();
        
        // Force reflow for masonry layout
        setTimeout(() => {
            const grid = document.querySelector('.masonry-grid');
            if (grid && window.getComputedStyle(grid).display === 'block') {
                // Trigger a reflow
                grid.style.opacity = '0.99';
                setTimeout(() => {
                    grid.style.opacity = '1';
                }, 10);
            }
        }, 100);
    });
    
    // Handle window resize for responsive masonry
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            adjustGridFallback();
        }, 250);
    });
</script>
</body>
</html>
